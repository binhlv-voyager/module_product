services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: modude_product_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
      - pgsql
      - mongo

  nginx:
    image: nginx:1.27-alpine
    container_name: modude_product_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: modude_product_mysql
    restart: unless-stopped
    ports:
      - "33060:3306"
    environment:
      MYSQL_DATABASE: module_product
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql

  pgsql:
    image: postgres:17-alpine
    container_name: modude_product_pgsql
    restart: unless-stopped
    ports:
      - "54320:5432"
    environment:
      POSTGRES_DB: module_category
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    volumes:
      - pgsql_data:/var/lib/postgresql/data

  mongo:
    image: mongo:8
    container_name: modude_product_mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: module_review
    volumes:
      - mongo_data:/data/db

volumes:
  mysql_data:
  pgsql_data:
  mongo_data:
